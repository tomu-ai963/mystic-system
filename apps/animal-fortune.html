      <div class="result-label">▷ 守護動物からのメッセージ</div>

    </div>
  </div>

// ========== 計算ロジック（弦本將裕式）==========
// base = その月の1日のキャラ番号 → num = base + (day - 1)
// 検証: 1981/5/6→21, 1993/6/14→3, 1990/1/3→5
function getAnimalFortune(birthdate) {
  const [y, m, d] = birthdate.split('-').map(Number);
  const table = yearMonthTable[y];
  if (!table) return null;
  let num = table[m - 1] + d - 1;
  if (num > 60) num -= 60;
  return { num, animal: animalMap[num] || '不明' };
}

window.onMysticLogin = () => document.getElementById("app").style.display = "block";
document.getElementById("logout-btn").addEventListener("click", () => { MysticAuth.logout(); location.reload(); });

const birthdateEl = document.getElementById("birthdate");
const genderEl    = document.getElementById("gender");
const cdEl        = document.getElementById("calc-display");

function updateCalcDisplay() {
  const birthdate = birthdateEl.value;
  const gender    = genderEl.value;
  if (!birthdate || !gender) { cdEl.style.display = "none"; return; }
  const r = getAnimalFortune(birthdate);
  if (!r) { cdEl.textContent = "対応していない年代です（1921〜2010年）"; cdEl.style.display = "block"; return; }
  cdEl.textContent = `キャラ番号：${r.num} ／ 守護動物：${r.animal}`;
  cdEl.style.display = "block";
}

birthdateEl.addEventListener("change", updateCalcDisplay);
genderEl.addEventListener("change", updateCalcDisplay);

document.getElementById("submit-btn").addEventListener("click", async () => {
  const gender    = genderEl.value;
  const birthdate = birthdateEl.value;
  if (!gender || !birthdate) { alert("性別と生年月日を入力してください"); return; }
  const r = getAnimalFortune(birthdate);
  if (!r) { alert("対応していない年代です（1921〜2010年）"); return; }
  const btn = document.getElementById("submit-btn");
  const res = document.getElementById("result");
  const rt  = document.getElementById("result-text");
  btn.disabled = true; btn.textContent = "動物を探しています...";
  res.classList.remove("hidden"); rt.innerHTML = '<span class="loading">✦ ✦ ✦</span>';
  try {
    const d = await MysticAuth.callApi("/mystic/animal-fortune", { birthdate, gender, animal: r.animal, num: r.num });
    rt.textContent = d.result;
  } catch(e) {
    rt.style.color = "var(--error)"; rt.textContent = "エラー: " + e.message;
  } finally {
    btn.disabled = false; btn.textContent = "守護動物を探す";
  }
});
