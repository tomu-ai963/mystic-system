<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>動物占い — MYSTIC SYSTEM</title>
<link rel="stylesheet" href="../mystic.css"/>
</head>
<body>
<header>
  <a href="../index.html" class="logo">✦ <span>Mystic</span> System</a>
  <button class="logout-btn" id="logout-btn">ログアウト</button>
</header>
<main id="app" style="display:none">
  <div class="app-hero">
    <span class="app-icon">🐾</span>
    <h1 class="app-title">動物占い</h1>
    <p class="app-desc">血液型と生年月日があなたの守護動物を明かします</p>
  </div>
  <div class="card">
    <div class="field-group">
      <label>血液型</label>
      <select id="blood-type">
        <option value="">選択してください</option>
        <option value="A型">A型</option>
        <option value="B型">B型</option>
        <option value="O型">O型</option>
        <option value="AB型">AB型</option>
      </select>
    </div>
    <div class="field-group">
      <label>生年月日</label>
      <input type="date" id="birthdate"/>
    </div>
    <div id="calc-display" style="display:none;margin:.6rem 0;padding:.5rem .8rem;background:rgba(130,80,255,.08);border:1px solid rgba(130,80,255,.2);border-radius:.5rem;font-size:.85rem;color:#b8a4ff;"></div>
    <button class="submit-btn" id="submit-btn">守護動物を探す</button>
    <div id="result" class="result hidden">
      <div class="result-label">▷ 守護動物からのメッセージ</div>
      <div id="result-text"></div>
    </div>
  </div>
</main>
<script src="../mystic-login.js"></script>
<script>
// 十二支ベースで12種の守護動物を確定的に割り当てる
function getAnimalFortune(birthdate,bloodType){
  const[y,m,d]=birthdate.split('-').map(Number);
  // 血液型オフセット
  const bOffset={'A型':0,'B型':3,'O型':6,'AB型':9};
  const base=['虎','狼','猿','羊','象','チーター','コアラ','ライオン','黒ヒョウ','狸','子鹿','ペガサス'];
  const idx=(y%12+(bOffset[bloodType]||0))%12;
  return base[idx];
}
window.onMysticLogin=()=>document.getElementById("app").style.display="block";
document.getElementById("logout-btn").addEventListener("click",()=>{MysticAuth.logout();location.reload();});
document.getElementById("submit-btn").addEventListener("click",async()=>{
  const bloodType=document.getElementById("blood-type").value;
  const birthdate=document.getElementById("birthdate").value;
  if(!bloodType||!birthdate){alert("血液型と生年月日を入力してください");return;}
  const animal=getAnimalFortune(birthdate,bloodType);
  const cd=document.getElementById("calc-display");
  cd.textContent=`守護動物：${animal}`;cd.style.display="block";
  const btn=document.getElementById("submit-btn");
  const res=document.getElementById("result");
  const rt=document.getElementById("result-text");
  btn.disabled=true;btn.textContent="動物を探しています...";
  res.classList.remove("hidden");rt.innerHTML='<span class="loading">✦ ✦ ✦</span>';
  try{const d=await MysticAuth.callApi("/mystic/animal-fortune",{birthdate,bloodType,animal});rt.textContent=d.result;}
  catch(e){rt.style.color="var(--error)";rt.textContent="エラー: "+e.message;}
  finally{btn.disabled=false;btn.textContent="守護動物を探す";}
});
</script>
</body>
</html>
